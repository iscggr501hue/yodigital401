<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Luis Miguel</title>

<style>
body{
    margin:0;
    height:100vh;
    background-image: url("https://img.freepik.com/foto-gratis/fondo-corazones-estilo-grunge-dia-san-valentin_1048-11652.jpg?semt=ais_rp_progressive&w=740&q=80"); 
    background-size: cover;       
    background-position: center;  
    background-repeat: no-repeat;
}

/* Estilo del texto */
.marquesina{
    position: absolute;
    top: 1%;
    width: 100%;
    overflow: hidden;
}

 .marquesina {
            width: 100%;
            overflow: hidden;
            white-space: nowrap;
            box-sizing: border-box;
        }
        .marquesina span {
            display: inline-block;
            padding-left: 100%;
            animation: mover 10s linear infinite;
            font-size: 30px; /* Tamaño grande */
            color: white; /* Color blanco */
            font-weight: bold;
        }
        @keyframes mover {
            0% {
                transform: translateX(0);
            }
            100% {
                transform: translateX(-100%);
            }
        }
</style>

</head>

<body>

<div class="marquesina">
    <span>LUIS MIGUEL</span>
</div>
