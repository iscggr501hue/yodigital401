<!DOCTYPE html>

    <meta charset="UTF-8">
    <title>Yo Digital</title>

    <style>
        /* Fondo degradado */
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to bottom, #87CEEB, #00BFFF);
            text-align: center;
        }

        /* Título animado */
        h1 {
            font-size: 60px;
            color: white;
            margin-top: 40px;
            animation: mover 3s infinite alternate ease-in-out;
        }

        @keyframes mover {
            from {
                transform: translateY(0px);
            }
            to {
                transform: translateY(20px);
            }
        }

        /* Tabla */
        table {
            margin: 50px auto;
        }

        td {
            padding: 20px;
        }

        /* Imágenes */
        .imagen {
            width: 200px;
            height: 150px;
            border: 5px solid white;
            border-radius: 10px;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        /* Efecto hover */
        .imagen:hover {
            transform: scale(1.1);
            box-shadow: 0px 0px 15px white;
        }

        /* Botones */
        .btn {
            display: inline-block;
            margin-top: 10px;
            padding: 10px 15px;
            background-color: white;
            color: #0077aa;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            transition: background 0.3s, color 0.3s;
        }

        .btn:hover {
            background-color: #0077aa;
            color: white;
        }
    </style>
</head>
